<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SSD Log AI Analyzer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      background: #f6f7fb;
      color: #222;
    }
    .card {
      max-width: 960px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 28px;
    }
    .top-actions {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .top-link {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 8px;
      background: #374151;
      color: white;
      text-decoration: none;
      font-size: 14px;
    }
    .row {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 12px;
      align-items: start;
      margin-bottom: 14px;
    }
    .row label {
      font-weight: 600;
      padding-top: 10px;
    }
    input[type="text"], select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cfd3dc;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }
    .actions {
      margin-top: 20px;
    }
    button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 14px;
      cursor: pointer;
      margin-right: 8px;
    }
    button:disabled {
      background: #9fb5ef;
      cursor: not-allowed;
    }
    .hint {
      color: #666;
      font-size: 13px;
    }
    .result {
      margin-top: 24px;
    }
    pre {
      background: #111827;
      color: #f9fafb;
      padding: 16px;
      border-radius: 10px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .status {
      margin-top: 8px;
      font-size: 14px;
    }
    .ok { color: #15803d; }
    .err { color: #b91c1c; }

    .dropzone {
      border: 2px dashed #9ca3af;
      border-radius: 12px;
      padding: 24px;
      background: #f9fafb;
      text-align: center;
      transition: 0.2s ease;
    }
    .dropzone.dragover {
      border-color: #2563eb;
      background: #eff6ff;
    }
    .folder-list {
      margin-top: 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      background: #fafafa;
      max-height: 220px;
      overflow-y: auto;
      font-size: 14px;
    }
    .folder-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 6px 0;
      border-bottom: 1px solid #eee;
    }
    .folder-item:last-child {
      border-bottom: none;
    }
    .progress-wrap {
      margin-top: 12px;
    }
    .progress-bar {
      width: 100%;
      height: 16px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: #2563eb;
      transition: width 0.2s ease;
    }
    .progress-text {
      margin-top: 6px;
      font-size: 13px;
      color: #444;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>SSD Log AI Analyzer</h1>
    <p class="hint">支援一次加入多個 Raw Log Folder，並顯示上傳進度與分析進度。</p>

    <div class="top-actions">
      <a class="top-link" href="/dataset">Open Dataset Manager</a>
    </div>

    <div class="row">
      <label for="issue">Customer Issue</label>
      <div>
        <select id="issue">
          <option value="">請選擇</option>
          <option value="media error">media error</option>
          <option value="i/o error">i/o error</option>
          <option value="timeout">timeout</option>
          <option value="drive not detected">drive not detected</option>
          <option value="performance drop">performance drop</option>
          <option value="__OTHER__">Other</option>
        </select>
        <div class="hint">若沒有符合項目，請選擇 Other。</div>
      </div>
    </div>

    <div class="row" id="issueOtherRow" style="display:none;">
      <label for="issueOther">Other Issue</label>
      <input id="issueOther" type="text" placeholder="例如 drive not detected after power cycle" />
    </div>

    <div class="row">
      <label>Raw Log Folders</label>
      <div>
        <div id="dropzone" class="dropzone">
          <div>拖曳一個或多個資料夾到這裡</div>
          <div class="hint" style="margin-top:8px;">
            或按 Add Folder，一個一個加入待上傳清單，再一次 Analyze
          </div>
          <div style="margin-top:12px;">
            <button type="button" id="addFolderBtn">Add Folder</button>
            <button type="button" id="clearFoldersBtn">Clear</button>
            <input id="folderPicker" type="file" webkitdirectory directory multiple style="display:none;" />
          </div>
        </div>

        <div id="folderList" class="folder-list">尚未加入任何資料夾</div>

        <div class="progress-wrap">
          <div class="progress-bar">
            <div id="progressFill" class="progress-fill"></div>
          </div>
          <div id="progressText" class="progress-text">0%</div>
        </div>
      </div>
    </div>

    <div class="row">
      <label for="saveToDb">Save to DB</label>
      <div>
        <label><input id="saveToDb" type="checkbox" /> 儲存此次分析結果到資料庫</label>
      </div>
    </div>

    <div class="actions">
      <button id="analyzeBtn">Analyze</button>
      <span id="status" class="status"></span>
    </div>

    <div class="result">
      <h3>Analysis Result</h3>
      <pre id="resultBox">尚未分析</pre>
    </div>
  </div>

  <script>
    const issueEl = document.getElementById("issue");
    const issueOtherRow = document.getElementById("issueOtherRow");
    const issueOtherEl = document.getElementById("issueOther");
    const analyzeBtn = document.getElementById("analyzeBtn");
    const statusEl = document.getElementById("status");
    const resultBox = document.getElementById("resultBox");
    const dropzone = document.getElementById("dropzone");
    const addFolderBtn = document.getElementById("addFolderBtn");
    const clearFoldersBtn = document.getElementById("clearFoldersBtn");
    const folderPicker = document.getElementById("folderPicker");
    const folderList = document.getElementById("folderList");
    const progressFill = document.getElementById("progressFill");
    const progressText = document.getElementById("progressText");

    let selectedFiles = [];
    let folderNameSet = new Set();

    function refreshIssueUI() {
      issueOtherRow.style.display = issueEl.value === "__OTHER__" ? "grid" : "none";
      if (issueEl.value !== "__OTHER__") {
        issueOtherEl.value = "";
      }
    }

    issueEl.addEventListener("change", refreshIssueUI);
    refreshIssueUI();

    function updateFolderList() {
      if (selectedFiles.length === 0) {
        folderList.innerHTML = "尚未加入任何資料夾";
        return;
      }

      const folderMap = new Map();
      for (const file of selectedFiles) {
        const rel = file.webkitRelativePath || file.name;
        const top = rel.split("/")[0] || "(unknown)";
        folderMap.set(top, (folderMap.get(top) || 0) + 1);
      }

      const html = [];
      for (const [name, count] of folderMap.entries()) {
        html.push(`
          <div class="folder-item">
            <span>${name}</span>
            <span>${count} files</span>
          </div>
        `);
      }
      folderList.innerHTML = html.join("");
    }

    function addFiles(files) {
      for (const file of files) {
        const rel = file.webkitRelativePath || file.name;
        const top = rel.split("/")[0] || "";

        if (!top) continue;

        // 同一資料夾只加一次整包
        const key = `${top}::${file.name}::${file.size}`;
        selectedFiles.push(file);
        folderNameSet.add(top);
      }
      updateFolderList();
    }

    addFolderBtn.addEventListener("click", () => {
      folderPicker.click();
    });

    folderPicker.addEventListener("change", (e) => {
      addFiles(Array.from(e.target.files || []));
      folderPicker.value = "";
    });

    clearFoldersBtn.addEventListener("click", () => {
      selectedFiles = [];
      folderNameSet.clear();
      updateFolderList();
      progressFill.style.width = "0%";
      progressText.textContent = "0%";
    });

    dropzone.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropzone.classList.add("dragover");
    });

    dropzone.addEventListener("dragleave", () => {
      dropzone.classList.remove("dragover");
    });

    dropzone.addEventListener("drop", async (e) => {
      e.preventDefault();
      dropzone.classList.remove("dragover");

      const items = Array.from(e.dataTransfer.items || []);
      const allFiles = [];

      async function walkEntry(entry, path = "") {
        return new Promise((resolve) => {
          if (entry.isFile) {
            entry.file((file) => {
              Object.defineProperty(file, "webkitRelativePath", {
                value: path + file.name,
                configurable: true
              });
              allFiles.push(file);
              resolve();
            });
          } else if (entry.isDirectory) {
            const reader = entry.createReader();
            reader.readEntries(async (entries) => {
              for (const ent of entries) {
                await walkEntry(ent, path + entry.name + "/");
              }
              resolve();
            });
          } else {
            resolve();
          }
        });
      }

      for (const item of items) {
        const entry = item.webkitGetAsEntry ? item.webkitGetAsEntry() : null;
        if (entry) {
          await walkEntry(entry, "");
        }
      }

      addFiles(allFiles);
    });

    analyzeBtn.addEventListener("click", async () => {
      const issue = issueEl.value;
      const issueOther = issueOtherEl.value.trim();
      const saveToDb = document.getElementById("saveToDb").checked;

      if (!issue) {
        alert("請選擇 Customer Issue");
        return;
      }

      if (issue === "__OTHER__" && !issueOther) {
        alert("請填寫 Other Issue");
        return;
      }

      if (selectedFiles.length === 0) {
        alert("請先加入至少一個 Raw Log Folder");
        return;
      }

      const formData = new FormData();
      formData.append("issue", issue);
      formData.append("issue_other", issueOther);
      formData.append("save_to_db", saveToDb ? "true" : "false");
      formData.append("folder_names", Array.from(folderNameSet).join("||"));

      for (const f of selectedFiles) {
        formData.append("log_files", f);
      }

      analyzeBtn.disabled = true;
      statusEl.textContent = "上傳中...";
      statusEl.className = "status";
      resultBox.textContent = "處理中，請稍候...";
      progressFill.style.width = "0%";
      progressText.textContent = "0%";

      const progressTimer = setInterval(async () => {
        try {
          const pResp = await fetch(`${window.location.origin}/progress`);
          const pData = await pResp.json();
          if (pData.stage) {
            statusEl.textContent = "分析中：" + pData.stage;
          }
        } catch (e) {}
      }, 1000);

      try {
        const data = await new Promise((resolve, reject) => {
          const xhr = new XMLHttpRequest();
          xhr.open("POST", `${window.location.origin}/analyze`);

          xhr.upload.onprogress = (e) => {
            if (e.lengthComputable) {
              const percent = Math.round((e.loaded / e.total) * 100);
              progressFill.style.width = percent + "%";
              progressText.textContent = percent + "%";
            }
          };

          xhr.onload = () => {
            try {
              resolve(JSON.parse(xhr.responseText));
            } catch (err) {
              reject(err);
            }
          };

          xhr.onerror = () => reject(new Error("upload failed"));
          xhr.send(formData);
        });

        if (!data.ok) {
          statusEl.textContent = "分析失敗";
          statusEl.className = "status err";
          resultBox.textContent = data.error || JSON.stringify(data, null, 2);
          return;
        }

        progressFill.style.width = "100%";
        progressText.textContent = "100%";

        statusEl.textContent =
          `完成 | token=${data.token_count}` +
          (data.db_action ? ` | DB=${data.db_action} case_id=${data.case_id}` : "");
        statusEl.className = "status ok";
        resultBox.textContent = data.llm_output;

      } catch (e) {
        statusEl.textContent = "連線失敗";
        statusEl.className = "status err";
        resultBox.textContent = String(e);
      } finally {
        clearInterval(progressTimer);
        analyzeBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
