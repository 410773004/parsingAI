<h1>Edit Case</h1>

<form method="post">

Serial
<input name="serial" value="{{case[1]}}">

Model
<input name="model" value="{{case[2]}}">

FW
<input name="fw_version" value="{{case[3]}}">

Cleaned Log
<textarea name="cleaned_log">{{case[4]}}</textarea>

LLM Output
<textarea name="llm_output">{{case[5]}}</textarea>

Ground Truth
<textarea name="ground_truth">{{case[6]}}</textarea>

<button type="submit">Update</button>

</form>
